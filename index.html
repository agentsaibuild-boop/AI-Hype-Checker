<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Hype Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #6366f1;
      --hype-hi:   #ef4444;
      --signal-hi: #10b981;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────── */
    header {
      padding: 28px 40px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    header span {
      font-size: 13px;
      color: var(--muted);
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 69px);
    }

    /* ── Left panel ─────────────────────────────────── */
    .panel-left {
      display: flex;
      flex-direction: column;
      padding: 28px 32px;
      border-right: 1px solid var(--border);
      gap: 14px;
    }

    label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.7;
      padding: 16px;
      resize: none;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      align-self: flex-end;
    }
    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Right panel ─────────────────────────────────── */
    .panel-right {
      display: flex;
      flex-direction: column;
      padding: 28px 32px;
      gap: 24px;
      overflow-y: auto;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: var(--muted);
    }
    .placeholder svg { opacity: .3; }

    /* ── Scores ─────────────────────────────────────── */
    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px;
      text-align: center;
    }
    .score-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .score-card .value {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
    }
    .score-card .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .verdict-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .verdict-badge {
      font-size: 14px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 20px;
      letter-spacing: .01em;
    }

    /* Verdict colors */
    .high_hype    .verdict-badge { background:#ef444422; color:#ef4444; border:1px solid #ef444444; }
    .likely_hype  .verdict-badge { background:#f9731622; color:#f97316; border:1px solid #f9731644; }
    .mixed        .verdict-badge { background:#f59e0b22; color:#f59e0b; border:1px solid #f59e0b44; }
    .signal       .verdict-badge { background:#06b6d422; color:#06b6d4; border:1px solid #06b6d444; }
    .strong_signal .verdict-badge { background:#10b98122; color:#10b981; border:1px solid #10b98144; }
    .neutral      .verdict-badge { background:#64748b22; color:#94a3b8; border:1px solid #64748b44; }

    /* Score value colors */
    .hype-value   { color: #ef4444; }
    .signal-value { color: #10b981; }
    .neutral-value { color: var(--muted); }

    /* ── Progress bar ────────────────────────────────── */
    .bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
    }
    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .bar-track {
      height: 8px;
      background: #10b98133;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #ef4444, #f97316);
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* ── Generic section wrapper ────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .summary-block {
      border-color: #6366f133;
      background: #6366f108;
    }

    /* ── Triggers ────────────────────────────────────── */
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 600;
    }

    .triggers {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .trigger-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .trigger-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .trigger-matches {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .match-chip {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* ── Highlighted text ────────────────────────────── */
    .highlighted-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .highlighted-text {
      font-size: 14px;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cbd5e1;
    }
    .hl {
      border-radius: 2px;
      transition: filter .15s;
    }
    .hl:hover { filter: brightness(1.3); }

    /* ── Legend ──────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    /* ── URL bar ─────────────────────────────────────── */
    .url-bar {
      display: flex;
      gap: 8px;
    }
    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--muted); }
    .btn-sm {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, opacity .15s;
    }
    .btn-sm:hover { border-color: var(--accent); }
    .btn-sm:disabled { opacity: .4; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Error ───────────────────────────────────────── */
    .error-msg {
      background: #ef444415;
      border: 1px solid #ef444433;
      border-radius: 8px;
      padding: 12px 16px;
      color: #ef4444;
      font-size: 13px;
    }
    .error-403 {
      background: #f59e0b10;
      border: 1px solid #f59e0b33;
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 13px;
      line-height: 1.7;
    }
    .error-403 strong { color: #f59e0b; display: block; margin-bottom: 8px; font-size: 14px; }
    .error-403 ol { padding-left: 18px; color: #94a3b8; }
    .error-403 ol li { margin-bottom: 4px; }
    .error-403 code { background: #1e293b; padding: 1px 5px; border-radius: 3px; color: #e2e8f0; font-size: 12px; }
    .btn-upload {
      display: inline-block;
      margin-top: 10px;
      background: #f59e0b22;
      color: #f59e0b;
      border: 1px solid #f59e0b44;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-upload:hover { background: #f59e0b33; }
    #html-file-input { display: none; }

    /* ── Spinner ─────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; height: auto; }
      .panel-left { height: 60vh; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>AI Hype Checker</h1>
  <span>Морфологичен анализ на AI съдържание · EN текст</span>
</header>

<main>
  <!-- LEFT: input -->
  <div class="panel-left">
    <label>URL (по желание)</label>
    <div class="url-bar">
      <input class="url-input" id="url-input" type="url"
        placeholder="https://techcrunch.com/..."
        onkeydown="if(event.key==='Enter') runAnalysis()">
    </div>
    <div class="divider">или постави текст директно</div>
    <textarea
      id="input-text"
      placeholder="Постави статия, прес съобщение, блог пост или абзац на английски..."></textarea>
    <button class="btn" id="analyze-btn" onclick="runAnalysis()">Анализирай</button>
    <input type="file" id="html-file-input" accept=".html,.htm" onchange="loadHtmlFile(event)">
  </div>

  <!-- RIGHT: results -->
  <div class="panel-right" id="results-panel">
    <div class="placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Постави текст и натисни Анализирай</p>
    </div>
  </div>
</main>

<script>
async function runAnalysis() {
  const url   = document.getElementById("url-input").value.trim();
  const area  = document.getElementById("input-text");
  const btn   = document.getElementById("analyze-btn");
  const panel = document.getElementById("results-panel");

  btn.disabled = true;
  panel.innerHTML = '';

  // Step 1: scrape URL if provided
  if (url) {
    btn.innerHTML = '<span class="spinner"></span>Зареждам...';
    const res  = await fetch("/scrape", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) {
      panel.innerHTML = scrapeFailedHtml(url, res.status, data.detail);
      btn.disabled = false;
      btn.textContent = "Анализирай";
      return;
    }
    area.value = data.text;
  }

  const text = area.value.trim();
  if (!text) {
    panel.innerHTML = `<div class="error-msg">Няма текст за анализ.</div>`;
    btn.disabled = false;
    btn.textContent = "Анализирай";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Анализирам...';
  panel.innerHTML = '';

  let data, summary = null;
  try {
    const [analyzeRes, summarizeRes] = await Promise.all([
      fetch("/analyze",   { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) }),
      fetch("/summarize", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) }),
    ]);
    if (!analyzeRes.ok) {
      const err = await analyzeRes.json();
      throw new Error(err.detail || "Грешка при анализ.");
    }
    data = await analyzeRes.json();
    if (summarizeRes.ok) {
      const s = await summarizeRes.json();
      summary = s.summary || null;
    }
  } catch (e) {
    panel.innerHTML = `<div class="error-msg">${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = "Анализирай";
    return;
  }

  btn.disabled = false;
  btn.textContent = "Анализирай";
  renderResults(panel, data, summary);
}

function scrapeFailedHtml(url, status, detail) {
  const reason = status === 403
    ? `Сайтът блокира автоматичен достъп <span style="color:#64748b;font-weight:400;">(HTTP ${status})</span>`
    : status === 422
    ? `Текстът не може да се извлече <span style="color:#64748b;font-weight:400;">(${esc(detail || '')})</span>`
    : `Неуспешно зареждане <span style="color:#64748b;font-weight:400;">(HTTP ${status})</span>`;

  return `
    <div class="error-403">
      <strong>⚠ ${reason}</strong>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:10px;">

        <div style="display:flex;gap:12px;align-items:flex-start;">
          <div style="min-width:22px;height:22px;border-radius:50%;background:#f59e0b22;
               border:1px solid #f59e0b44;color:#f59e0b;font-size:12px;font-weight:700;
               display:flex;align-items:center;justify-content:center;">1</div>
          <div style="color:#94a3b8;font-size:13px;line-height:1.6;">
            Отвори <a href="${esc(url)}" target="_blank"
              style="color:#6366f1;text-decoration:none;">страницата в браузъра</a>,
            избери целия текст (<code>Ctrl+A</code>),
            копирай (<code>Ctrl+C</code>) и го постави в текстовото поле вляво.
          </div>
        </div>

        <div style="display:flex;gap:12px;align-items:flex-start;">
          <div style="min-width:22px;height:22px;border-radius:50%;background:#f59e0b22;
               border:1px solid #f59e0b44;color:#f59e0b;font-size:12px;font-weight:700;
               display:flex;align-items:center;justify-content:center;">2</div>
          <div style="color:#94a3b8;font-size:13px;line-height:1.6;">
            В браузъра: <code>Ctrl+S</code> → избери
            <code>Webpage, HTML only</code> → запази файла →
            зареди го тук:
            <label class="btn-upload" style="display:inline-block;margin-top:6px;"
              onclick="document.getElementById('html-file-input').click()">
              Зареди .html файл
            </label>
          </div>
        </div>

      </div>
    </div>`;
}

async function loadHtmlFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const btn   = document.getElementById("analyze-btn");
  const panel = document.getElementById("results-panel");
  const url   = document.getElementById("url-input").value.trim();

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Обработвам файла...';

  const html = await file.text();
  let data;
  try {
    const res = await fetch("/extract-html", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ html, url }),
    });
    data = await res.json();
    if (!res.ok) throw new Error(data.detail);
  } catch (e) {
    panel.innerHTML = `<div class="error-msg">${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = "Анализирай";
    event.target.value = "";
    return;
  }

  document.getElementById("input-text").value = data.text;
  event.target.value = "";

  // auto-analyze
  btn.disabled = false;
  btn.textContent = "Анализирай";
  runAnalysis();
}

function renderResults(panel, d, summary) {
  const barPct = Math.round(d.hype_score * 10);

  // ── Scores ───────────────────────────────────────────
  const scoresHtml = `
    <div class="scores">
      <div class="score-card">
        <div class="label">Хайп</div>
        <div class="value" style="color:${scoreColor(d.hype_score, true)}">${d.hype_score.toFixed(1)}</div>
        <div class="sub">от 10</div>
      </div>
      <div class="score-card">
        <div class="label">Аргументация</div>
        <div class="value" style="color:${scoreColor(d.signal_score, false)}">${d.signal_score.toFixed(1)}</div>
        <div class="sub">от 10</div>
      </div>
      <div class="verdict-card ${d.verdict_level}">
        <span class="verdict-badge">${d.verdict}</span>
      </div>
    </div>`;

  // ── Trust conclusion ─────────────────────────────────
  const tr = d.trust;
  const cl = d.claims;

  function claimRow(text, color, icon) {
    return `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;">
      <span style="color:${color};font-size:13px;margin-top:1px;flex-shrink:0;">${icon}</span>
      <span style="font-size:13px;color:#cbd5e1;line-height:1.55;font-style:italic;">"${esc(text)}"</span>
    </div>`;
  }

  const trustHtml = `
    <div style="background:${tr.color}0d;border:1px solid ${tr.color}33;
                border-radius:12px;padding:20px 22px;">

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;
                    letter-spacing:.08em;padding:4px 12px;border-radius:20px;
                    background:${tr.color}22;color:${tr.color};
                    border:1px solid ${tr.color}44;white-space:nowrap;">
          Доверие: ${tr.level}
        </div>
      </div>

      <p style="font-size:15px;color:#e2e8f0;line-height:1.6;margin:0 0 16px 0;">${esc(tr.summary)}</p>

      ${tr.positives.length ? `
        <div style="margin-bottom:12px;">
          ${tr.positives.map(p => `
            <div style="display:flex;gap:8px;align-items:baseline;margin-bottom:5px;">
              <span style="color:#10b981;font-size:13px;flex-shrink:0;">✓</span>
              <span style="font-size:13px;color:#94a3b8;">${esc(p)}</span>
            </div>`).join("")}
        </div>` : ''}

      ${tr.caveats.length ? `
        <div style="margin-bottom:16px;">
          ${tr.caveats.map(c => `
            <div style="display:flex;gap:8px;align-items:baseline;margin-bottom:5px;">
              <span style="color:#f59e0b;font-size:13px;flex-shrink:0;">⚠</span>
              <span style="font-size:13px;color:#94a3b8;">${esc(c)}</span>
            </div>`).join("")}
        </div>` : ''}

      ${cl.supported.length ? `
        <div style="border-top:1px solid #1e293b;padding-top:14px;margin-bottom:12px;">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;
                      color:#475569;font-weight:600;margin-bottom:8px;">
            Твърдения подкрепени в текста
          </div>
          ${cl.supported.map(s => claimRow(s, '#10b981', '✓')).join("")}
        </div>` : ''}

      ${cl.to_verify.length ? `
        <div style="border-top:1px solid #1e293b;padding-top:14px;">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;
                      color:#475569;font-weight:600;margin-bottom:8px;">
            Трябва да се провери независимо
          </div>
          ${cl.to_verify.map(s => claimRow(s, '#f59e0b', '?')).join("")}
        </div>` : ''}

    </div>`;

  // ── Novelty ───────────────────────────────────────────
  const nv = d.novelty;
  const noveltyHtml = `
    <div class="bar-wrap">
      <div class="section-title" style="margin-bottom:10px;">Новост на твърденията</div>
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <div style="font-size:28px;font-weight:800;color:${nv.color}">${nv.icon}</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:${nv.color}">${nv.verdict}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">
            ${nv.has_novelty ? 'Открити новостни твърдения' : 'Без новостни твърдения'} ·
            ${nv.has_backing ? 'Prior work цитиран' : 'Без prior work'}
          </div>
        </div>
        ${nv.novelty_phrases.length ? `
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">
          ${nv.novelty_phrases.map(p =>
            `<span style="font-size:12px;padding:2px 8px;border-radius:4px;
              background:${nv.color}22;color:${nv.color};border:1px solid ${nv.color}44;
              font-family:monospace;">${esc(p)}</span>`
          ).join("")}
        </div>` : ''}
      </div>
    </div>`;

  // ── Signal structure (Toulmin) ────────────────────────
  function check(val) { return val ? '✓' : '–'; }
  function checkColor(val) { return val ? '#10b981' : '#475569'; }
  const tf = d.toulmin_fired;

  const toulminHtml = `
    <div class="bar-wrap">
      <div class="section-title" style="margin-bottom:12px;">Структурни сигнали</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        ${Object.entries(tf).map(([label, fired]) => `
          <div style="background:#0f1117;border-radius:8px;padding:10px 14px;flex:1;min-width:140px;">
            <div style="font-size:18px;font-weight:800;color:${checkColor(fired)}">${check(fired)}</div>
            <div style="font-size:12px;color:${fired ? 'var(--text)' : 'var(--muted)'};margin-top:4px;line-height:1.3;">${esc(label)}</div>
          </div>`).join("")}
      </div>
    </div>`;

  // ── Triggers ──────────────────────────────────────────
  function triggerRows(triggers) {
    if (!triggers.length) return '<p style="color:var(--muted);font-size:13px;">Няма намерени паттерни.</p>';
    return triggers.map(t => `
      <div class="trigger-row">
        <div class="trigger-name" style="color:${t.color}">${esc(t.category)}</div>
        <div class="trigger-matches">
          ${t.matches.map(m =>
            `<span class="match-chip" style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}44">${esc(m)}</span>`
          ).join("")}
        </div>
      </div>`).join("");
  }

  const triggersHtml = `
    <div>
      <div class="section-title" style="margin-bottom:10px;">Хайп паттерни</div>
      <div class="triggers">${triggerRows(d.hype_triggers)}</div>
    </div>
    <div>
      <div class="section-title" style="margin-bottom:10px;">Технически сигнали · ${d.word_count} думи</div>
      <div class="triggers">${triggerRows(d.signal_triggers)}</div>
    </div>`;

  // ── Legend + highlighted text ─────────────────────────
  const legendHtml = `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Революционни претенции</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>PR структура</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Неизмерени твърдения</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Демократизация</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Доказателство</div>
      <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Обяснение</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Prior work</div>
      <div class="legend-item"><div class="legend-dot" style="background:#14b8a6"></div>Ограничения</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Предпазливост</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Baseline сравнение</div>
    </div>`;

  const textHtml = `
    <div>
      <div class="section-title" style="margin-bottom:10px;">Маркиран текст</div>
      ${legendHtml}
      <div class="highlighted-wrap" style="margin-top:10px;">
        <div class="highlighted-text">${d.highlighted_html}</div>
      </div>
    </div>`;

  const summaryHtml = summary ? `
    <div class="section summary-block">
      <div class="section-title">РЕЗЮМЕ</div>
      <p style="font-size:14px;line-height:1.75;color:#cbd5e1;margin:0;">${esc(summary)}</p>
    </div>` : '';

  panel.innerHTML = summaryHtml + scoresHtml + trustHtml + noveltyHtml + toulminHtml + triggersHtml + textHtml;
}

function scoreColor(v, isHype) {
  if (isHype)  return v >= 7 ? "#ef4444" : v >= 4 ? "#f97316" : "#10b981";
  return v >= 7 ? "#10b981" : v >= 4 ? "#3b82f6" : "#64748b";
}

function esc(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Ctrl+Enter / Cmd+Enter submits
document.getElementById("input-text").addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") runAnalysis();
});
</script>

</body>
